name: Lighthouse

# Lighthouse CI — runs on every PR to main, against a locally-built
# production server. Upload target is LHCI's temporary public storage,
# so each run gets a public report URL that the action comments on
# the PR (via `treosh/lighthouse-ci-action`'s summary step).
#
# Assertions are split by severity in lighthouserc.json:
#   - accessibility / seo  → error (fail the job)
#   - performance / best-practices → warn (surface but don't block)
#
# We don't run this on push-to-main — no value in measuring twice.

on:
  pull_request:
    branches: [main]

# Scope concurrency per PR — a rapid push sequence cancels the older
# run so we don't rack up wasted Actions minutes.
concurrency:
  group: lighthouse-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: dummy
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Run Lighthouse CI
        run: pnpm dlx @lhci/cli@0.15.x autorun
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: dummy
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
